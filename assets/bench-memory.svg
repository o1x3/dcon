<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 330" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="gMemDcon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ea043"/><stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="gMemOrb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb"/><stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="gMemDD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bd561d"/><stop offset="1" stop-color="#f0883e"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="818" height="328" rx="16" fill="#0d1117" stroke="#21262d"/>

  <text x="36" y="50" fill="#e6edf3" font-size="24" font-weight="700">Idle engine memory</text>
  <text x="36" y="74" fill="#7d8590" font-size="13">Resident memory with zero containers running — lower is better</text>

  <!-- gridlines + axis labels (0,500,1000,1500,2000 MB) -->
  <g stroke="#21262d" stroke-dasharray="3 4">
    <line x1="367.5" y1="96" x2="367.5" y2="284"/>
    <line x1="485" y1="96" x2="485" y2="284"/>
    <line x1="602.5" y1="96" x2="602.5" y2="284"/>
    <line x1="720" y1="96" x2="720" y2="284"/>
  </g>
  <g fill="#484f58" font-size="10" text-anchor="middle">
    <text x="250" y="300">0</text><text x="367.5" y="300">500</text>
    <text x="485" y="300">1000</text><text x="602.5" y="300">1500</text>
    <text x="720" y="300">2000 MB</text>
  </g>

  <!-- dcon: 92 MB -->
  <text x="232" y="124" text-anchor="end" fill="#e6edf3" font-size="15" font-weight="600">dcon</text>
  <text x="232" y="140" text-anchor="end" fill="#7d8590" font-size="11">Apple container</text>
  <rect x="250" y="110" width="22" height="40" rx="8" fill="url(#gMemDcon)"/>
  <text x="286" y="136" fill="#3fb950" font-size="16" font-weight="700">92 MB</text>
  <g transform="translate(360,116)">
    <rect width="172" height="28" rx="14" fill="#238636" fill-opacity="0.16"/>
    <text x="14" y="19" fill="#3fb950" font-size="13" font-weight="600">≈ 12× lighter when idle</text>
  </g>

  <!-- OrbStack: 1094 MB -->
  <text x="232" y="186" text-anchor="end" fill="#e6edf3" font-size="15" font-weight="600">OrbStack</text>
  <text x="232" y="202" text-anchor="end" fill="#7d8590" font-size="11">docker engine</text>
  <rect x="250" y="172" width="257" height="40" rx="8" fill="url(#gMemOrb)"/>
  <text x="521" y="198" fill="#58a6ff" font-size="16" font-weight="700">1094 MB</text>

  <!-- Docker Desktop: ~2000 MB (reference, not measured here) -->
  <text x="232" y="248" text-anchor="end" fill="#e6edf3" font-size="15" font-weight="600">Docker Desktop</text>
  <text x="232" y="264" text-anchor="end" fill="#7d8590" font-size="11">typical*</text>
  <rect x="250" y="234" width="470" height="40" rx="8" fill="url(#gMemDD)" fill-opacity="0.85"/>
  <text x="710" y="260" text-anchor="end" fill="#ffffff" font-size="16" font-weight="700">~2000 MB</text>

  <text x="36" y="320" fill="#484f58" font-size="10.5">dcon &amp; OrbStack measured on this host (Apple M-series) · *Docker Desktop is a typical published reference</text>
</svg>
