name: App CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

permissions:
  contents: read

jobs:
  build:
    name: swift build · test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: check app/VERSION
        run: |
          VERSION=$(tr -d '[:space:]' < app/VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "error: app/VERSION must look like 1.2.3 (got '$VERSION')" >&2
            exit 1
          fi
          echo "app/VERSION=$VERSION"

      - name: swift version
        run: swift --version

      - name: build
        run: swift build --package-path app

      - name: test
        run: swift test --package-path app
